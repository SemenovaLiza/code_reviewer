version: "3.9"
services:
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - ai-net
    ports:
      - "6333:6333"

  ingestion:
    build:
      context: .
      dockerfile: embeddings/Dockerfile
    depends_on:
      - qdrant
    env_file:
      - .env
    networks:
      - ai-net
    restart: "no"

  agent:
    build:
      context: .
      dockerfile: code_reviewer/Dockerfile
    depends_on:
      ingestion:
        condition: service_completed_successfully
    env_file:
      - .env
    networks:
      - ai-net
    ports:
      - "8000:8000"
    develop:
      watch:
        - action: sync
          path: ./code_reviewer
          target: /app/code_reviewer
        - action: rebuild
          path: code_reviewer/requirements.txt

  webhook-server:
    build:
      context: .
      dockerfile: github_server/Dockerfile
    env_file:
      - .env
    ports:
      - "8001:8001"
    volumes:
      - ./webhook_logs:/app/logs
    networks:
      - ai-net
    restart: unless-stopped
    depends_on:
      agent:
        condition: service_started
    develop:
      watch:
        - action: sync
          path: ./github_server
          target: /app/github_server
        - action: rebuild
          path: github_server/requirements.txt

volumes:
  qdrant_data:
networks:
  ai-net:
    driver: bridge
